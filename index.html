<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>수강신청 로그인</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">
    <div class="container bg-white p-5 shadow-sm rounded" style="max-width: 400px;">
        <h2 class="text-center mb-4">🏫 수강신청 로그인</h2>
        <input type="text" id="studentId" class="form-control mb-3" placeholder="학번을 입력하세요">
        <input type="text" id="studentName" class="form-control mb-4" placeholder="성명을 입력하세요">
        <button onclick="login()" class="btn btn-primary w-100">로그인</button>
    </div>

    <script>
        function login() {
            const id = document.getElementById('studentId').value;
            const name = document.getElementById('studentName').value;
            if(id && name) {
                // 로그인 정보를 임시 저장하고 메인으로 이동
                localStorage.setItem('user', JSON.stringify({id, name}));
                location.href = 'main.html';
            } else {
                alert("정보를 입력해주세요!");
            }
        }
    </script>
</body>
</html>
